<!DOCTYPE html>
<html>
<head>
    <title>StarterPool - Student Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #fafafa;
        }
        
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dbdbdb;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
        }
        
        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-icons a {
            text-decoration: none;
            font-size: 24px;
            color: #262626;
        }
        
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .profile-header {
            display: flex;
            gap: 40px;
            padding: 30px 0;
            border-bottom: 1px solid #dbdbdb;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 15px;
        }
        
        .profile-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }
        
        .stat-number {
            font-weight: 600;
        }
        
        .profile-bio {
            margin-top: 10px;
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        
        .skill {
            background: #efefef;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        
        .btn-message, .btn-hire {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-message {
            background: #efefef;
            color: #262626;
        }
        
        .btn-hire {
            background: #0095f6;
            color: white;
        }
        
        .rate {
            font-size: 20px;
            font-weight: 600;
            color: #2ecc71;
        }
        
        .premium-badge {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; align-items: center; text-align: center; }
            .profile-stats { justify-content: center; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🏊 StarterPool</div>
    <div class="nav-icons">
        <a href="/">🏠</a>
        <a href="/signup" style="font-size: 16px;">Join</a>
    </div>
</div>

<div class="profile-container" id="profileContainer">
    <div style="text-align:center; padding:50px;">Loading...</div>
</div>

<script>
    // Get student ID from URLvar pathParts = window.location.pathname.split('/');
    var studentId = pathParts[pathParts.length - 1];
    
    // Student database
    var students = {
        maria: {
            name: "Maria Chen",
            avatar: "👩‍💻",
            university: "3rd year CS, UCLA",
            email: "maria.chen@starterpool.com",
            rate: 18,
            bio: "Frontend React developer passionate about building beautiful interfaces.",
            skills: ["React", "HTML/CSS", "JavaScript"],
            premium: false,
            followers: 245,
            following: 180
        },
        james: {
            name: "James Okafor",
            avatar: "👨‍💻",
            university: "Final year, MIT",
            email: "james.okafor@starterpool.com",
            rate: 22,
            bio: "Backend developer specializing in Python and Django.",
            skills: ["Python", "Django", "PostgreSQL"],
            premium: true,
            followers: 512,
            following: 234
        },
        emma: {
            name: "Emma Watson",
            avatar: "🎨",
            university: "2nd year, RISD",
            email: "emma.watson@starterpool.com",
            rate: 19,
            bio: "Graphic designer specializing in branding and logo design.",
            skills: ["Figma", "Illustrator", "Photoshop"],
            premium: false,
            followers: 389,
            following: 145
        },
        sarah: {
            name: "Sarah Johnson",
            avatar: "✍️",
            university: "2nd year, NYU",
            email: "sarah.johnson@starterpool.com",
            rate: 15,
            bio: "Content writer with SEO expertise.",
            skills: ["Blog Writing", "SEO", "Copywriting"],
            premium: false,
            followers: 178,
            following: 92
        }
    };
    
    var student = students[studentId];
    
    function renderProfile() {
        if (!student) {
            document.getElementById('profileContainer').innerHTML = '<div style="text-align:center; padding:50px;"><h2>Student not found</h2><a href="/">Go back home</a></div>';
            return;
        }
        
        // Build premium badge
        var premiumBadge = '';
        if (student.premium) {
            premiumBadge = '<span class="premium-badge">⭐ PREMIUM</span>';
        }
        
        // Build skills HTML
        var skillsHtml = '<div class="skills">';
        for (var i = 0; i < student.skills.length; i++) {
            skillsHtml += '<span class="skill">' + student.skills[i] + '</span>';
        }
        skillsHtml += '</div>';
        
        // Build the full HTML
        var html = '';
        html += '<div class="profile-header">';
        html += '<div class="profile-avatar">' + student.avatar + '</div>';
        html += '<div class="profile-info">';
        html += '<div class="profile-name">' + student.name + ' ' + premiumBadge + '</div>';
        html += '<div class="profile-stats">';
        html += '<div><span class="stat-number">' + student.posts + '</span> posts</div>';
        html += '<div><span class="stat-number">' + student.followers + '</span> followers</div>';
        html += '<div><span class="stat-number">' + student.following + '</span> following</div>';
        html += '</div>';
        html += '<div class="profile-bio">';
        html += '<p><strong>' + student.university + '</strong></p>';
        html += '<p>' + student.bio + '</p>';
        html += '<div class="rate">💰 $' + student.rate + '/hour</div>';
        html += skillsHtml;
        html += '</div>';
        html += '<div class="action-buttons">';
        html += '<button class="btn-message" onclick="sendEmail()">💬 Send Message</button>';
        html += '<button class="btn-hire" onclick="hireStudent()">💰 Hire Now</button>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '<div style="margin-top: 20px; text-align: center; padding: 20px; border-top: 1px solid #dbdbdb;">';html += '<p style="font-size: 12px; color: #8e8e8e;">💰 StarterPool takes 10% commission. Students receive 90%.</p>';
        html += '</div>';
        
        document.getElementById('profileContainer').innerHTML = html;
    }
    
    function sendEmail() {
        window.location.href = 'mailto:' + student.email + '?subject=Interested in hiring you from StarterPool&body=Hi ' + student.name + ', I saw your profile and I am interested in working with you.';
    }
    
    function hireStudent() {
        var hours = prompt('How many hours will ' + student.name + ' work? ($' + student.rate + '/hour)', '10');
        if (hours && !isNaN(hours) && hours > 0) {
            var total = student.rate * hours;
            var fee = total * 0.1;
            var studentGets = total - fee;
            alert('✅ Hire request sent to ' + student.name + '!\n\nTotal: $' + total + '\nStarterPool fee (10%): $' + fee + '\n' + student.name + ' receives: $' + studentGets + '\n\nYou will receive payment instructions via email.');
        }
    }
    
    renderProfile();
</script>

</body>
</html>
