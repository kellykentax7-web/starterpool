<!DOCTYPE html>
<html>
<head>
    <title>StarterPool - Student Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #fafafa;
        }
        
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dbdbdb;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
        }
        
        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-icons a {
            text-decoration: none;
            font-size: 24px;
            color: #262626;
        }
        
        .profile-container {
            max-width: 935px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .profile-header {
            display: flex;
            gap: 60px;
            padding: 30px 0;
            border-bottom: 1px solid #dbdbdb;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-name-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .profile-name {
            font-size: 28px;
            font-weight: 300;
        }
        
        .profile-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            font-size: 16px;
        }
        
        .stat-number {
            font-weight: 600;
        }
        
        .profile-bio {
            margin-top: 10px;
        }
        
        .profile-bio h1 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .profile-tabs {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 15px 0;
            border-top: 1px solid #dbdbdb;
            margin-top: 20px;
        }
        
        .tab-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #8e8e8e;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn.active {
            color: #262626;
            border-top: 1px solid #262626;
            margin-top: -16px;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 10px;
        }
        
        .post-item {
            aspect-ratio: 1;
            background: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-size: 30px;
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        
        .skill {
            background: #efefef;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }.action-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        
        .btn-message, .btn-hire {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-message {
            background: #efefef;
            color: #262626;
        }
        
        .btn-hire {
            background: #0095f6;
            color: white;
        }
        
        .rate {
            font-size: 20px;
            font-weight: 600;
            color: #2ecc71;
        }
        
        .premium-badge {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 350px;
            background: white;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .message-sent {
            background: #0f3460;
            color: white;
            align-self: flex-end;
        }
        
        .message-received {
            background: #efefef;
            color: #262626;
            align-self: flex-start;
        }
        
        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #dbdbdb;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px;
            border: none;
            background: #efefef;
            border-radius: 20px;
        }
        
        .send-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        @media (max-width: 735px) {
            .profile-header { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
            .profile-name-row { justify-content: center; }
            .profile-stats { justify-content: center; }
            .posts-grid { gap: 2px; }
            .chat-modal { width: 100%; right: 0; left: 0; bottom: 0; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">StarterPool</div>
    <div class="nav-icons">
        <a href="/">🏠</a>
        <a href="#" onclick="openInbox()">💬</a>
        <a href="/signup" style="font-size: 16px;">Join</a>
    </div>
</div>

<div class="profile-container" id="profileContainer"></div>

<div id="chatModal" class="chat-modal">
    <div class="chat-header">
        <strong id="chatStudentName">Chat</strong>
        <button onclick="closeChat()" style="background:none; border:none; font-size:20px; cursor:pointer;">×</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const studentId = window.location.pathname.split('/').pop();let currentChatStudent = null;
    let conversations = JSON.parse(localStorage.getItem('starterpool_chats')) || {};
    
    const students = {
        maria: {
            name: "Maria Chen",
            avatar: "👩‍💻",
            username: "mariachen",
            university: "3rd year CS, UCLA",
            email: "maria.chen@starterpool.com",
            rate: 18,
            bio: "Frontend React developer passionate about building beautiful interfaces.",
            skills: ["React", "HTML/CSS", "JavaScript", "Node.js"],
            posts: ["Portfolio project", "E-commerce site", "Learning Next.js"],
            portfolio: [{ title: "Todo App", link: "#" }],
            certs: ["Meta Frontend Cert"],
            premium: false,
            followers: 245,
            following: 180
        },
        james: {
            name: "James Okafor",
            avatar: "👨‍💻",
            username: "jamesokafor",
            university: "Final year, MIT",
            email: "james.okafor@starterpool.com",
            rate: 22,
            bio: "Backend developer specializing in Python and Django.",
            skills: ["Python", "Django", "PostgreSQL"],
            posts: ["Built a REST API", "Deployed on AWS", "Reading Clean Code"],
            portfolio: [{ title: "REST API", link: "#" }],
            certs: ["AWS Cloud"],
            premium: true,
            followers: 512,
            following: 234
        }
    };
    
    const student = students[studentId];
    
    function renderProfile() {
        if (!student) {
            document.getElementById('profileContainer').innerHTML = '<div style="text-align:center; padding:50px;"><h2>Student not found</h2><a href="/">Go back home</a></div>';
            return;
        }
        
        const premiumBadge = student.premium ? '<span class="premium-badge">⭐ PREMIUM</span>' : '';
        
        let skillsHtml = '<div class="skills">';
        student.skills.forEach(function(s) {
            skillsHtml += '<span class="skill">' + s + '</span>';
        });
        skillsHtml += '</div>';
        
        let postsHtml = '<div class="posts-grid">';
        for (let i = 0; i < student.posts.length; i++) {
            postsHtml += '<div class="post-item" onclick="alert(\\'Post: ' + student.posts[i] + '\\')">📷</div>';
        }
        postsHtml += '</div>';
        
        let portfolioHtml = '<div class="posts-grid">';
        for (let i = 0; i < student.portfolio.length; i++) {
            portfolioHtml += '<div class="post-item" onclick="window.open(\\'' + student.portfolio[i].link + '\\', \\'_blank\\')">📁 ' + student.portfolio[i].title + '</div>';
        }
        portfolioHtml += '</div>';
        
        document.getElementById('profileContainer').innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar">${student.avatar}</div>
                <div class="profile-info">
                    <div class="profile-name-row">
                        <span class="profile-name">${student.name}</span>
                        ${premiumBadge}
                        <button class="btn-message" onclick="openChat('${studentId}')" style="padding:5px 15px;">Message</button>
                    </div>
                    <div class="profile-stats">
                        <div class="stat"><span class="stat-number">${student.posts.length}</span> posts</div>
                        <div class="stat"><span class="stat-number">${student.followers}</span> followers</div>
                        <div class="stat"><span class="stat-number">${student.following}</span> following</div>
                    </div>
                    <div class="profile-bio">
                        <h1>${student.university}</h1>
                        <p>${student.bio}</p>
                        <div class="rate">💰 $${student.rate}/hour</div>
                        ${skillsHtml}
                    </div>
                    <div class="action-buttons"><button class="btn-message" onclick="openChat('${studentId}')">💬 Message</button>
                        <button class="btn-hire" onclick="hireStudent()">💰 Hire Now</button>
                    </div>
                </div>
            </div>
            
            <div class="profile-tabs">
                <button class="tab-btn active" onclick="switchTab('posts')">📷 POSTS</button>
                <button class="tab-btn" onclick="switchTab('portfolio')">📁 PORTFOLIO</button>
            </div>
            
            <div id="postsTab">${postsHtml}</div>
            <div id="portfolioTab" style="display: none;">${portfolioHtml}</div>
            
            <div style="margin-top: 20px; text-align: center; padding: 20px; border-top: 1px solid #dbdbdb;">
                <p style="font-size: 12px; color: #8e8e8e;">💰 StarterPool takes 10% commission. Students receive 90%.</p>
            </div>
        `;
    }
    
    function switchTab(tab) {
        const postsTab = document.getElementById('postsTab');
        const portfolioTab = document.getElementById('portfolioTab');
        const btns = document.querySelectorAll('.tab-btn');
        
        if (tab === 'posts') {
            postsTab.style.display = 'block';
            portfolioTab.style.display = 'none';
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
        } else {
            postsTab.style.display = 'none';
            portfolioTab.style.display = 'block';
            btns[0].classList.remove('active');
            btns[1].classList.add('active');
        }
    }
    
    function hireStudent() {
        if (!student) return;
        const hours = prompt(`How many hours will ${student.name} work? ($${student.rate}/hour)`, "10");
        if (hours && !isNaN(hours)) {
            const total = student.rate * hours;
            const fee = total * 0.1;
            alert(`✅ Hire request sent to ${student.name}!\n\nTotal: $${total}\nStarterPool fee (10%): $${fee}\n${student.name} receives: $${total - fee}\n\nYou will receive payment instructions via email.`);
        }
    }
    
    function openChat(id) {
        currentChatStudent = id;
        document.getElementById('chatStudentName').innerText = 'Chat with ' + student.name;
        document.getElementById('chatModal').style.display = 'flex';
        loadMessages();
    }
    
    function closeChat() {
        document.getElementById('chatModal').style.display = 'none';
        currentChatStudent = null;
    }
    
    function loadMessages() {
        if (!conversations[currentChatStudent]) {
            conversations[currentChatStudent] = [];
        }
        const messagesDiv = document.getElementById('chatMessages');
        messagesDiv.innerHTML = '';
        for (let i = 0; i < conversations[currentChatStudent].length; i++) {
            const msg = conversations[currentChatStudent][i];
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (msg.sender === 'employer' ? 'message-sent' : 'message-received');
            msgDiv.innerHTML = msg.text;
            messagesDiv.appendChild(msgDiv);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || !currentChatStudent) return;
        
        if (!conversations[currentChatStudent]) {
            conversations[currentChatStudent] = [];
        }
        conversations[currentChatStudent].push({ sender: 'employer', text: message, time: new Date().toISOString() });
        localStorage.setItem('starterpool_chats', JSON.stringify(conversations));
        input.value = '';
        loadMessages();
    }
    
    function openInbox() {
        let inboxMsg = "📥 Your Conversations:\n\n";
        let hasMessages = false;
        for (const id in conversations) {
            if (conversations[id].length > 0) {
                hasMessages = true;const studentName = students[id] ? students[id].name : id;
                const lastMsg = conversations[id][conversations[id].length - 1];
                inboxMsg += "💬 " + studentName + ": " + lastMsg.text.substring(0, 30) + "...\n";
            }
        }
        if (!hasMessages) {
            inboxMsg = "No messages yet. Start a conversation!";
        }
        alert(inboxMsg);
    }
    
    renderProfile();
</script>

</body>
</html>
