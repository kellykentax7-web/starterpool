<!DOCTYPE html>
<html>
<head>
    <title>StarterPool - Find Talent</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.light {
            --bg: #fafafa;
            --card-bg: white;
            --text: #262626;
            --border: #dbdbdb;
            --nav-bg: white;
            --input-bg: #efefef;
        }
        
        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --border: #2c2c2c;
            --nav-bg: #1e1e1e;
            --input-bg: #2c2c2c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        /* Instagram-style Top Bar */
        .top-bar {
            background: var(--nav-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f3460, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-icons {
            display: flex;
            gap: 20px;
        }
        
        .nav-icons button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }
        
        /* TikTok-style Search Bar */
        .search-container {
            padding: 12px 16px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
        }
        
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
        }
        
        .search-icon {
            font-size: 18px;
            color: #8e8e8e;
        }
        
        .search-input {
            flex: 1;
            background: none;
            border: none;
            font-size: 16px;
            color: var(--text);
            outline: none;
        }
        
        .search-input::placeholder {
            color: #8e8e8e;
        }
        
        .cancel-btn {
            background: none;
            border: none;
            color: #0095f6;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Categories Row - Scrollable */
        .categories-row {
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            background: var(--nav-bg);
        }
        
        .categories-row::-webkit-scrollbar {
            display: none;
        }
        
        .category-chip {
            display: inline-block;
            padding: 8px 20px;
            margin-right: 10px;
            background: var(--input-bg);
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-chip.active {
            background: #0095f6;
            color: white;
        }
        
        /* Feed Container */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
        }
        
        /* Instagram-style Post */
        .post {
            background: var(--card-bg);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        
        .post-header {
            display: flex;align-items: center;
            gap: 12px;
            padding: 12px;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .post-user-info {
            flex: 1;
        }
        
        .post-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .post-category-tag {
            font-size: 11px;
            color: #0095f6;
        }
        
        .post-time {
            font-size: 10px;
            color: #8e8e8e;
        }
        
        .post-image {
            background: var(--input-bg);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin: 0 12px;
            border-radius: 12px;
        }
        
        .post-caption {
            padding: 12px;
            font-size: 14px;
        }
        
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 8px 12px;
        }
        
        .post-action {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        .post-likes {
            padding: 0 12px 8px;
            font-weight: 600;
            font-size: 13px;
        }
        
        /* Profile Card for Search Results */
        .profile-result {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .profile-result-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .profile-result-info {
            flex: 1;
        }
        
        .profile-result-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .profile-result-category {
            font-size: 12px;
            color: #0095f6;
        }
        
        .profile-result-rate {
            font-size: 13px;
            font-weight: 600;
            color: #2ecc71;
        }
        
        /* Profile View */
        .profile-view {
            background: var(--card-bg);
        }
        
        .profile-cover {
            height: 150px;
            background: linear-gradient(135deg, #0f3460, #e94560);
        }
        
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: -50px auto 10px;
            border: 3px solid var(--card-bg);
        }
        
        .profile-name-large {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-category-large {
            text-align: center;
            color: #0095f6;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .profile-bio-section {
            text-align: center;
            padding: 15px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .message-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }/* Chat Modal */
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }
        
        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .msg-sent {
            background: #0095f6;
            color: white;
            align-self: flex-end;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
        }
        
        .msg-received {
            background: var(--input-bg);
            color: var(--text);
            align-self: flex-start;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 10px;
            border-top: 1px solid var(--border);
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
        }
        
        .send-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #8e8e8e;
        }
        
        @media (max-width: 600px) {
            .post-image { min-height: 250px; }
            .chat-modal { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🏊 StarterPool</div>
    <div class="nav-icons">
        <button onclick="showFeed()">🏠</button>
        <button onclick="showSearch()">🔍</button>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="search-container" id="searchContainer" style="display: none;">
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by category... (e.g., Engineer, Designer, Writer, Any)">
        <button class="cancel-btn" onclick="clearSearch()">Cancel</button>
    </div>
</div>

<div class="categories-row" id="categoriesRow">
    <span class="category-chip active" data-cat="all" onclick="filterByCategory('all')">All</span>
    <span class="category-chip" data-cat="engineer" onclick="filterByCategory('engineer')">🔧 Engineer</span>
    <span class="category-chip" data-cat="designer" onclick="filterByCategory('designer')">🎨 Designer</span>
    <span class="category-chip" data-cat="developer" onclick="filterByCategory('developer')">💻 Developer</span>
    <span class="category-chip" data-cat="writer" onclick="filterByCategory('writer')">✍️ Writer</span>
    <span class="category-chip" data-cat="marketer" onclick="filterByCategory('marketer')">📱 Marketer</span>
    <span class="category-chip" data-cat="video" onclick="filterByCategory('video')">🎬 Video</span><span class="category-chip" data-cat="assistant" onclick="filterByCategory('assistant')">📋 Assistant</span>
    <span class="category-chip" data-cat="translator" onclick="filterByCategory('translator')">🌐 Translator</span>
    <span class="category-chip" data-cat="other" onclick="filterByCategory('other')">➕ Other</span>
</div>

<div class="feed-container" id="mainContainer">
    <div class="empty-state">Loading...</div>
</div>

<div id="chatModal" class="chat-modal">
    <div class="chat-header">
        <span id="chatName">Chat</span>
        <button onclick="closeChat()" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Theme
    function toggleTheme() {
        var body = document.body;
        if (body.classList.contains('light')) {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('theme', 'light');
        }
    }
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
    } else {
        document.body.classList.add('light');
    }
    
    // Flexible student data - ANY category works
    var students = [
        { id: "1", name: "Maria Chen", avatar: "👩‍💻", category: "developer", subCategory: "frontend", rate: 18, bio: "React frontend developer", location: "UCLA" },
        { id: "2", name: "James Okafor", avatar: "👨‍💻", category: "developer", subCategory: "backend", rate: 22, bio: "Python backend developer", location: "MIT" },
        { id: "3", name: "Sarah Johnson", avatar: "✍️", category: "writer", subCategory: "content", rate: 15, bio: "SEO content writer", location: "NYU" },
        { id: "4", name: "Emma Watson", avatar: "🎨", category: "designer", subCategory: "graphic", rate: 19, bio: "Logo designer", location: "RISD" },
        { id: "5", name: "Michael Chen", avatar: "🔧", category: "engineer", subCategory: "mechanical", rate: 25, bio: "Mechanical engineer", location: "Texas A&M" },
        { id: "6", name: "Emily Rodriguez", avatar: "📱", category: "marketer", subCategory: "social", rate: 17, bio: "Social media strategist", location: "USC" },
        { id: "7", name: "Alex Wong", avatar: "🎬", category: "video", subCategory: "editing", rate: 21, bio: "Video editor", location: "NYU Film" },
        { id: "8", name: "Jessica Taylor", avatar: "📋", category: "assistant", subCategory: "admin", rate: 14, bio: "Virtual assistant", location: "ASU" },
        { id: "9", name: "Carlos Mendez", avatar: "🌐", category: "translator", subCategory: "spanish", rate: 19, bio: "Spanish translator", location: "UT Austin" },
        { id: "10", name: "Priya Patel", avatar: "💻", category: "developer", subCategory: "fullstack", rate: 24, bio: "Full-stack developer", location: "Stanford" }
    ];
    
    var posts = [
        { id: 1, userId: "1", name: "Maria Chen", avatar: "👩‍💻", category: "developer", content: "Just finished a React dashboard!", emoji: "💻", likes: 45, time: "2h ago" },
        { id: 2, userId: "2", name: "James Okafor", avatar: "👨‍💻", category: "developer", content: "Deployed my API on AWS", emoji: "☁️", likes: 89, time: "5h ago" },
        { id: 3, userId: "4", name: "Emma Watson", avatar: "🎨", category: "designer", content: "New logo for a coffee shop", emoji: "🎨", likes: 234, time: "1d ago" },
        { id: 4, userId: "3", name: "Sarah Johnson", avatar: "✍️", category: "writer", content: "SEO guide for beginners", emoji: "📝", likes: 67, time: "3h ago" },{ id: 5, userId: "5", name: "Michael Chen", avatar: "🔧", category: "engineer", content: "3D model for mechanical part", emoji: "🔧", likes: 34, time: "1d ago" }
    ];
    
    var conversations = JSON.parse(localStorage.getItem('starterpool_chats')) || {};
    var currentView = 'feed';
    var currentCategory = 'all';
    var currentChatUser = null;
    var searchQuery = '';
    
    function showFeed() {
        currentView = 'feed';
        document.getElementById('searchContainer').style.display = 'none';
        document.getElementById('searchInput').value = '';
        searchQuery = '';
        renderFeed();
    }
    
    function showSearch() {
        currentView = 'search';
        document.getElementById('searchContainer').style.display = 'block';
        document.getElementById('searchInput').focus();
        renderSearchResults(students);
    }
    
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        searchQuery = '';
        renderSearchResults(students);
        showFeed();
    }
    
    function filterByCategory(category) {
        currentCategory = category;
        var chips = document.querySelectorAll('.category-chip');
        chips.forEach(function(chip) {
            if (chip.getAttribute('data-cat') === category) {
                chip.classList.add('active');
            } else {
                chip.classList.remove('active');
            }
        });
        
        if (currentView === 'feed') {
            renderFeed();
        } else if (currentView === 'search') {
            renderSearchResults(students);
        }
    }
    
    function renderFeed() {
        var container = document.getElementById('mainContainer');
        var filteredPosts = posts.filter(function(p) {
            if (currentCategory === 'all') return true;
            return p.category === currentCategory;
        });
        
        if (filteredPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 No posts in this category yet</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filteredPosts.length; i++) {
            var p = filteredPosts[i];
            html += '<div class="post">';
            html += '<div class="post-header">';
            html += '<div class="post-avatar">' + p.avatar + '</div>';
            html += '<div class="post-user-info">';
            html += '<div class="post-name">' + p.name + '</div>';
            html += '<div class="post-category-tag">' + p.category.toUpperCase() + '</div>';
            html += '<div class="post-time">' + p.time + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="post-image">' + p.emoji + '</div>';
            html += '<div class="post-caption">' + p.content + '</div>';
            html += '<div class="post-actions">';
            html += '<button class="post-action" onclick="likePost(' + p.id + ')">❤️</button>';
            html += '<button class="post-action" onclick="viewProfile(\'' + p.userId + '\')">👤</button>';
            html += '</div>';
            html += '<div class="post-likes">' + p.likes + ' likes</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    function renderSearchResults(studentsList) {
        var container = document.getElementById('mainContainer');
        var searchInput = document.getElementById('searchInput');
        var query = searchInput ? searchInput.value.toLowerCase() : '';
        searchQuery = query;
        
        var filtered = studentsList.filter(function(s) {
            if (currentCategory !== 'all' && s.category !== currentCategory) return false;
            if (query) {
                return s.category.toLowerCase().includes(query) || 
                       s.name.toLowerCase().includes(query) ||
                       s.subCategory.toLowerCase().includes(query);
            }
            return true;
        });
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">🔍 No results found for "' + (query || currentCategory) + '"<br><br>Try "engineer", "designer", "developer", "writer", etc.</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var s = filtered[i];
            html += '<div class="profile-result" onclick="viewProfile(\'' + s.id + '\')">';
            html += '<div class="profile-result-avatar">' + s.avatar + '</div>';
            html += '<div class="profile-result-info">';
            html += '<div class="profile-result-name">' + s.name + '</div>';
            html += '<div class="profile-result-category">' + s.category.toUpperCase() + '</div>';
            html += '<div class="profile-result-rate">💰 $' + s.rate + '/hour</div>';
            html += '<div style="font-size:12px; color:#8e8e8e;">📍 ' + s.location + '</div>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    function searchProfiles() {
        renderSearchResults(students);
    }
    
    // Live search as you type
    document.addEventListener('DOMContentLoaded', function() {
        var searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                if (currentView === 'search') {
                    renderSearchResults(students);
                }
            });
        }
    });
    
    function likePost(postId) {
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) {
                posts[i].likes++;
                break;
            }
        }
        renderFeed();
    }
    
    function viewProfile(userId) {
        var student = students.find(function(s) { return s.id === userId; });
        if (!student) return;
        
        var container = document.getElementById('mainContainer');
        var userPosts = posts.filter(function(p) { return p.userId === userId; });
        
        var postsHtml = '';
        for (var i = 0; i < userPosts.length; i++) {
            var p = userPosts[i];
            postsHtml += '<div class="post">';
            postsHtml += '<div class="post-header">';
            postsHtml += '<div class="post-avatar">' + p.avatar + '</div>';
            postsHtml += '<div><div class="post-name">' + p.name + '</div><div class="post-time">' + p.time + '</div></div>';
            postsHtml += '</div>';
            postsHtml += '<div class="post-image" style="font-size:60px; padding:30px;">' + p.emoji + '</div>';
            postsHtml += '<div class="post-caption">' + p.content + '</div>';
            postsHtml += '</div>';
        }
        
        var html = '';
        html += '<button class="back-btn" onclick="showSearch()">← Back</button>';
        html += '<div class="profile-view">';
        html += '<div class="profile-cover"></div>';
        html += '<div class="profile-avatar-large">' + student.avatar + '</div>';
        html += '<div class="profile-name-large">' + student.name + '</div>';
        html += '<div class="profile-category-large">' + student.category.toUpperCase() + ' • $' + student.rate + '/hour</div>';
        html += '<div class="profile-bio-section">';
        html += '<p>' + student.bio + '</p>';
        html += '<p>📍 ' + student.location + '</p>';
        html += '<button class="message-btn" onclick="openChat(\'' + student.id + '\', \'' + student.name + '\')">💬 Message</button>';
        html += '</div>';
        
        if (userPosts.length > 0) {
            html += '<div style="padding:15px;"><h3 style="margin-bottom:10px;">Recent Work</h3>' + postsHtml + '</div>';
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function openChat(userId, name) {
        currentChatUser = userId;
        document.getElementById('chatName').innerHTML = '💬 ' + name;
        document.getElementById('chatModal').style.display = 'flex';
        loadMessages();
    }
    
    function closeChat() {document.getElementById('chatModal').style.display = 'none';
        currentChatUser = null;
    }
    
    function loadMessages() {
        if (!conversations[currentChatUser]) {
            conversations[currentChatUser] = [];
        }
        var msgsDiv = document.getElementById('chatMessages');
        msgsDiv.innerHTML = '';
        for (var i = 0; i < conversations[currentChatUser].length; i++) {
            var msg = conversations[currentChatUser][i];
            var div = document.createElement('div');
            div.className = msg.sender === 'employer' ? 'msg-sent' : 'msg-received';
            div.innerHTML = msg.text;
            msgsDiv.appendChild(div);
        }
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
    }
    
    function sendMessage() {
        var input = document.getElementById('chatInput');
        var message = input.value.trim();
        if (!message || !currentChatUser) return;
        
        if (!conversations[currentChatUser]) {
            conversations[currentChatUser] = [];
        }
        conversations[currentChatUser].push({ sender: 'employer', text: message });
        localStorage.setItem('starterpool_chats', JSON.stringify(conversations));
        input.value = '';
        loadMessages();
    }
    
    showFeed();
</script>

</body>
</html>
