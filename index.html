<!DOCTYPE html>
<html>
<head>
    <title>StarterPool - Find Talent</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.light {
            --bg: #fafafa;
            --card-bg: white;
            --text: #262626;
            --border: #dbdbdb;
            --nav-bg: white;
            --input-bg: #efefef;
        }
        
        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --border: #2c2c2c;
            --nav-bg: #1e1e1e;
            --input-bg: #2c2c2c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        .top-bar {
            background: var(--nav-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f3460, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-icons {
            display: flex;
            gap: 20px;
        }
        
        .nav-icons button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }
        
        .search-container {
            padding: 12px 16px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
        }
        
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
        }
        
        .search-input {
            flex: 1;
            background: none;
            border: none;
            font-size: 16px;
            color: var(--text);
            outline: none;
        }
        
        .cancel-btn {
            background: none;
            border: none;
            color: #0095f6;
            font-size: 14px;
            cursor: pointer;
        }
        
        .categories-row {
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            background: var(--nav-bg);
        }
        
        .categories-row::-webkit-scrollbar { display: none; }
        
        .category-chip {
            display: inline-block;
            padding: 8px 20px;
            margin-right: 10px;
            background: var(--input-bg);
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .category-chip.active {
            background: #0095f6;
            color: white;
        }
        
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
            padding-bottom: 80px;
        }
        
        .post {
            background: var(--card-bg);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;cursor: pointer;
            overflow: hidden;
        }
        
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .post-user-info {
            flex: 1;
            cursor: pointer;
        }
        
        .post-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .post-category-tag {
            font-size: 11px;
            color: #0095f6;
        }
        
        .post-time {
            font-size: 10px;
            color: #8e8e8e;
        }
        
        .post-media {
            background: var(--input-bg);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 12px;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
        }
        
        .post-emoji { font-size: 80px; }
        
        .post-video {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .post-caption { padding: 12px; font-size: 14px; }
        
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 8px 12px;
        }
        
        .post-action {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .action-count { font-size: 14px; color: var(--text); }
        
        .post-likes {
            padding: 0 12px 4px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .comments-section {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            display: none;
        }
        
        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .comment-name { font-weight: 600; }
        
        .comment-input-area {
            display: flex;
            gap: 10px;
            padding: 8px 0;
        }
        
        .comment-input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--input-bg);
            color: var(--text);
        }
        
        .profile-result {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .profile-result-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        
        .profile-result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-result-name { font-weight: 600; }
        .profile-result-category { font-size: 12px; color: #0095f6; }
        
        .profile-view {
            background: var(--card-bg);
        }
        
        .profile-cover {
            height: 150px;
            background: linear-gradient(135deg, #0f3460, #e94560);
        }
        
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: -50px auto 10px;
            border: 3px solid var(--card-bg);
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar-large img {
            width: 100%;height: 100%;
            object-fit: cover;
        }
        
        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0095f6;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }
        
        .profile-name-large {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-bio-section {
            text-align: center;
            padding: 15px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .profile-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .profile-link {
            color: #0095f6;
            text-decoration: none;
            font-size: 13px;
        }
        
        .edit-profile-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text);
        }
        
        .message-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        /* Edit Profile Modal */
        .edit-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            z-index: 2000;
            border: 1px solid var(--border);
        }
        
        .edit-modal input, .edit-modal textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text);
        }
        
        .edit-modal textarea {
            resize: none;
            height: 80px;
        }
        
        .save-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        
        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .msg-sent {
            background: #0095f6;
            color: white;
            align-self: flex-end;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
        }
        
        .msg-received {
            background: var(--input-bg);
            color: var(--text);
            align-self: flex-start;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
        }
        
        .chat-input-area {
            display: flex;padding: 12px;
            gap: 10px;
            border-top: 1px solid var(--border);
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text);
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #8e8e8e;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        
        @media (max-width: 600px) {
            .post-media { min-height: 250px; }
            .chat-modal { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🏊 StarterPool</div>
    <div class="nav-icons">
        <button onclick="showFeed()">🏠</button>
        <button onclick="showSearch()">🔍</button>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="search-container" id="searchContainer" style="display: none;">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by category...">
        <button class="cancel-btn" onclick="clearSearch()">Cancel</button>
    </div>
</div>

<div class="categories-row" id="categoriesRow">
    <span class="category-chip active" data-cat="all" onclick="filterByCategory('all')">All</span>
    <span class="category-chip" data-cat="engineer" onclick="filterByCategory('engineer')">🔧 Engineer</span>
    <span class="category-chip" data-cat="designer" onclick="filterByCategory('designer')">🎨 Designer</span>
    <span class="category-chip" data-cat="developer" onclick="filterByCategory('developer')">💻 Developer</span>
    <span class="category-chip" data-cat="writer" onclick="filterByCategory('writer')">✍️ Writer</span>
    <span class="category-chip" data-cat="marketer" onclick="filterByCategory('marketer')">📱 Marketer</span>
    <span class="category-chip" data-cat="video" onclick="filterByCategory('video')">🎬 Video</span>
    <span class="category-chip" data-cat="assistant" onclick="filterByCategory('assistant')">📋 Assistant</span>
    <span class="category-chip" data-cat="translator" onclick="filterByCategory('translator')">🌐 Translator</span>
</div>

<div class="feed-container" id="mainContainer">
    <div class="empty-state">Loading...</div>
</div>

<div id="chatModal" class="chat-modal">
    <div class="chat-header">
        <span id="chatName">Chat</span>
        <button onclick="closeChat()" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Message...">
        <button onclick="sendMessage()" style="background:#0095f6; color:white; border:none; padding:12px 20px; border-radius:25px;">Send</button>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeEditModal()"></div>
<div id="editModal" class="edit-modal">
    <h3 style="margin-bottom:15px;">Edit Profile</h3>
    <input type="text" id="editName" placeholder="Name">
    <textarea id="editBio" placeholder="Bio - tell us about yourself"></textarea>
    <input type="url" id="editLink" placeholder="Website / Portfolio / LinkedIn">
    <input type="file" id="editAvatar" accept="image/*">
    <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    <button onclick="closeEditModal()" style="margin-top:10px; background:none; border:none; cursor:pointer; color:#8e8e8e;">Cancel</button>
</div><script>
    // Theme
    function toggleTheme() {
        var body = document.body;
        if (body.classList.contains('light')) {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('theme', 'light');
        }
    }
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
    } else {
        document.body.classList.add('light');
    }
    
    // Load user profile from localStorage
    var currentUserId = "current_user";
    var userProfile = JSON.parse(localStorage.getItem('userProfile')) || {
        name: "Maria Chen",
        avatar: "👩‍💻",
        avatarImg: null,
        category: "developer",
        rate: 18,
        bio: "React frontend developer passionate about building beautiful interfaces.",
        location: "UCLA",
        link: "https://github.com/mariachen"
    };
    
    var userLikedPosts = JSON.parse(localStorage.getItem('userLikedPosts')) || {};
    
    var students = [
        { id: "1", name: "Maria Chen", avatar: "👩‍💻", avatarImg: null, category: "developer", rate: 18, bio: "React frontend developer", location: "UCLA", link: "https://github.com/mariachen" },
        { id: "2", name: "James Okafor", avatar: "👨‍💻", avatarImg: null, category: "developer", rate: 22, bio: "Python backend developer", location: "MIT", link: "https://github.com/jamesokafor" },
        { id: "3", name: "Sarah Johnson", avatar: "✍️", avatarImg: null, category: "writer", rate: 15, bio: "SEO content writer", location: "NYU", link: "https://sarahjohnson.contently.com" },
        { id: "4", name: "Emma Watson", avatar: "🎨", avatarImg: null, category: "designer", rate: 19, bio: "Logo designer", location: "RISD", link: "https://behance.net/emmawatson" },
        { id: "5", name: "Michael Chen", avatar: "🔧", avatarImg: null, category: "engineer", rate: 25, bio: "Mechanical engineer", location: "Texas A&M", link: "https://linkedin.com/in/michaelchen" }
    ];
    
    // Update current user in students array
    students[0] = userProfile;
    
    var posts = [
        { id: 1, userId: "1", name: userProfile.name, avatar: userProfile.avatar, avatarImg: userProfile.avatarImg, category: "developer", content: "Just finished a React dashboard! Check it out", mediaType: "emoji", mediaUrl: "💻", likes: 45, comments: [], time: "2h ago" },
        { id: 2, userId: "2", name: "James Okafor", avatar: "👨‍💻", avatarImg: null, category: "developer", content: "Deployed my API on AWS", mediaType: "video", mediaUrl: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", likes: 89, comments: [], time: "5h ago" },
        { id: 3, userId: "4", name: "Emma Watson", avatar: "🎨", avatarImg: null, category: "designer", content: "New logo for a coffee shop", mediaType: "emoji", mediaUrl: "🎨", likes: 234, comments: [], time: "1d ago" },
        { id: 4, userId: "3", name: "Sarah Johnson", avatar: "✍️", avatarImg: null, category: "writer", content: "SEO guide for beginners", mediaType: "emoji", mediaUrl: "📝", likes: 67, comments: [], time: "3h ago" }
    ];
    
    var conversations = JSON.parse(localStorage.getItem('starterpool_chats')) || {};
    var currentView = 'feed';
    var currentCategory = 'all';
    var currentChatUser = null;
    
    function showFeed() {
        currentView = 'feed';
        document.getElementById('searchContainer').style.display = 'none';
        renderFeed();
    }
    
    function showSearch() {
        currentView = 'search';
        document.getElementById('searchContainer').style.display = 'block';
        renderSearchResults(students);
    }
    
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        showFeed();
    }
    
    function filterByCategory(category) {
        currentCategory = category;
        var chips = document.querySelectorAll('.category-chip');
        chips.forEach(function(chip) {
            if (chip.getAttribute('data-cat') === category) {
                chip.classList.add('active');
            } else {
                chip.classList.remove('active');
            }
        });
        if (currentView === 'feed') renderFeed();
        else renderSearchResults(students);
    }
    
    function renderFeed() {
        var container = document.getElementById('mainContainer');
        var filteredPosts = posts.filter(function(p) {
            if (currentCategory === 'all') return true;
            return p.category === currentCategory;
        });
        
        if (filteredPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">No posts in this category</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filteredPosts.length; i++) {
            var p = filteredPosts[i];
            var hasLiked = userLikedPosts[p.id] === true;
            var avatarHtml = p.avatarImg ? '<img src="' + p.avatarImg + '">' : p.avatar;
            var mediaHtml = p.mediaType === 'video' ? '<video class="post-video" controls src="' + p.mediaUrl + '"></video>' : '<div class="post-emoji">' + p.mediaUrl + '</div>';
            
            var commentsHtml = '';
            if (p.comments && p.comments.length > 0) {
                for (var c = 0; c < p.comments.length; c++) {
                    commentsHtml += '<div class="comment"><span class="comment-name">' + p.comments[c].name + ':</span> ' + p.comments[c].text + '</div>';
                }
            }
            
            html += '<div class="post" data-post-id="' + p.id + '">';
            html += '<div class="post-header">';
            html += '<div class="post-avatar" onclick="viewProfile(\'' + p.userId + '\')">' + avatarHtml + '</div>';
            html += '<div class="post-user-info" onclick="viewProfile(\'' + p.userId + '\')">';
            html += '<div class="post-name">' + p.name + '</div>';
            html += '<div class="post-category-tag">' + p.category.toUpperCase() + '</div>';
            html += '<div class="post-time">' + p.time + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="post-media">' + mediaHtml + '</div>';
            html += '<div class="post-caption">' + p.content + '</div>';
            html += '<div class="post-actions">';
            html += '<button class="post-action" onclick="likePost(' + p.id + ')">' + (hasLiked ? '❤️' : '🤍') + '<span class="action-count">' + p.likes + '</span></button>';
            html += '<button class="post-action" onclick="toggleComments(' + p.id + ')">💬<span class="action-count">' + (p.comments ? p.comments.length : 0) + '</span></button>';
            html += '<button class="post-action" onclick="viewProfile(\'' + p.userId + '\')">👤</button>';
            html += '</div>';
            html += '<div class="post-likes">' + p.likes + ' likes</div>';
            html += '<div class="comments-section" id="comments-' + p.id + '">';
            html += '<div id="comments-list-' + p.id + '">' + commentsHtml + '</div>';
            html += '<div class="comment-input-area">';
            html += '<input type="text" id="comment-input-' + p.id + '" class="comment-input" placeholder="Add a comment...">';
            html += '<button onclick="addComment(' + p.id + ')" style="background:#0095f6; color:white; border:none; padding:8px 16px; border-radius:20px;">Post</button>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    function likePost(postId) {
        if (userLikedPosts[postId]) {
            alert("You already liked this post!");
            return;
        }
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) {
                posts[i].likes++;
                userLikedPosts[postId] = true;
                localStorage.setItem('userLikedPosts', JSON.stringify(userLikedPosts));
                break;
            }
        }
        renderFeed();
    }
    
    function toggleComments(postId) {
        var commentsDiv = document.getElementById('comments-' + postId);
        if (commentsDiv.style.display === 'none' || commentsDiv.style.display === '') {
            commentsDiv.style.display = 'block';
        } else {
            commentsDiv.style.display = 'none';
        }
    }
    
    function addComment(postId) {
        var input = document.getElementById('comment-input-' + postId);
        var commentText = input.value.trim();
        if (!commentText) return;
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) {
                if (!posts[i].comments) posts[i].comments = [];
                posts[i].comments.push({ name: "You", text: commentText });
                break;
            }
        }
        input.value = '';
        renderFeed();
    }
    
    function renderSearchResults(studentsList) {
        var container = document.getElementById('mainContainer');
        var searchInput = document.getElementById('searchInput');
        var query = searchInput ? searchInput.value.toLowerCase() : '';
        var filtered = studentsList.filter(function(s) {
            if (currentCategory !== 'all' && s.category !== currentCategory) return false;
            if (query) return s.category.toLowerCase().includes(query) || s.name.toLowerCase().includes(query);
            return true;
        });
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">No results found</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var s = filtered[i];
            var avatarHtml = s.avatarImg ? '<img src="' + s.avatarImg + '">' : s.avatar;
            html += '<div class="profile-result" onclick="viewProfile(\'' + s.id + '\')">';
            html += '<div class="profile-result-avatar">' + avatarHtml + '</div>';
            html += '<div style="flex:1;">';
            html += '<div class="profile-result-name">' + s.name + '</div>';
            html += '<div class="profile-result-category">' + s.category.toUpperCase() + '</div>';
            html += '<div>💰 $' + s.rate + '/hour</div>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        var searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                if (currentView === 'search') renderSearchResults(students);
            });
        }
    });
    
    function openEditModal() {
        document.getElementById('editName').value = userProfile.name;
        document.getElementById('editBio').value = userProfile.bio || '';
        document.getElementById('editLink').value = userProfile.link || '';
        document.getElementById('editModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    
    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
    
    function saveProfile() {
        userProfile.name = document.getElementById('editName').value;
        userProfile.bio = document.getElementById('editBio').value;
        userProfile.link = document.getElementById('editLink').value;
        
        var avatarFile = document.getElementById('editAvatar').files[0];
        if (avatarFile) {
            var reader = new FileReader();
            reader.onload = function(e) {
                userProfile.avatarImg = e.target.result;
                userProfile.avatar = null;
                localStorage.setItem('userProfile', JSON.stringify(userProfile));
                students[0] = userProfile;
                posts[0].name = userProfile.name;posts[0].avatar = userProfile.avatar;
                posts[0].avatarImg = userProfile.avatarImg;
                closeEditModal();
                renderFeed();
            };
            reader.readAsDataURL(avatarFile);
        } else {
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            students[0] = userProfile;
            posts[0].name = userProfile.name;
            closeEditModal();
            renderFeed();
        }
    }
    
    function viewProfile(userId) {
        var student = students.find(function(s) { return s.id === userId; });
        if (!student) return;
        var isOwner = (userId === "1");
        var avatarHtml = student.avatarImg ? '<img src="' + student.avatarImg + '">' : student.avatar;
        var userPosts = posts.filter(function(p) { return p.userId === userId; });
        var postsHtml = '';
        for (var i = 0; i < userPosts.length; i++) {
            var p = userPosts[i];
            postsHtml += '<div class="post"><div class="post-header"><div class="post-avatar">' + (p.avatarImg ? '<img src="' + p.avatarImg + '">' : p.avatar) + '</div><div><div class="post-name">' + p.name + '</div><div class="post-time">' + p.time + '</div></div></div><div class="post-caption">' + p.content + '</div></div>';
        }
        
        var html = '';
        html += '<button class="back-btn" onclick="showSearch()">← Back</button>';
        html += '<div class="profile-view">';
        html += '<div class="profile-cover"></div>';
        html += '<div class="profile-avatar-large">' + avatarHtml + (isOwner ? '<div class="edit-avatar-btn" onclick="openEditModal()">✏️</div>' : '') + '</div>';
        html += '<div class="profile-name-large">' + student.name + '</div>';
        html += '<div class="profile-category-large">' + student.category.toUpperCase() + ' • $' + student.rate + '/hour</div>';
        html += '<div class="profile-bio-section">';
        html += '<p>' + (student.bio || "No bio yet") + '</p>';
        html += '<p>📍 ' + student.location + '</p>';
        if (student.link) html += '<div class="profile-links"><a href="' + student.link + '" target="_blank" class="profile-link">🔗 ' + student.link + '</a></div>';
        if (isOwner) html += '<button class="edit-profile-btn" onclick="openEditModal()">✏️ Edit Profile</button>';
        else html += '<button class="message-btn" onclick="openChat(\'' + student.id + '\', \'' + student.name + '\')">💬 Message</button>';
        html += '</div>';
        if (userPosts.length > 0) html += '<div style="padding:15px;"><h3>Recent Work</h3>' + postsHtml + '</div>';
        html += '</div>';
        document.getElementById('mainContainer').innerHTML = html;
    }
    
    function openChat(userId, name) {
        currentChatUser = userId;
        document.getElementById('chatName').innerHTML = '💬 ' + name;
        document.getElementById('chatModal').style.display = 'flex';
        loadMessages();
    }
    
    function closeChat() {
        document.getElementById('chatModal').style.display = 'none';
        currentChatUser = null;
    }
    
    function loadMessages() {
        if (!conversations[currentChatUser]) conversations[currentChatUser] = [];
        var msgsDiv = document.getElementById('chatMessages');
        msgsDiv.innerHTML = '';
        for (var i = 0; i < conversations[currentChatUser].length; i++) {
            var msg = conversations[currentChatUser][i];
            var div = document.createElement('div');
            div.className = msg.sender === 'employer' ? 'msg-sent' : 'msg-received';
            div.innerHTML = msg.text;
            msgsDiv.appendChild(div);
        }
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
    }
    
    function sendMessage() {
        var input = document.getElementById('chatInput');
        var message = input.value.trim();
        if (!message || !currentChatUser) return;
        if (!conversations[currentChatUser]) conversations[currentChatUser] = [];
        conversations[currentChatUser].push({ sender: 'employer', text: message });localStorage.setItem('starterpool_chats', JSON.stringify(conversations));
        input.value = '';
        loadMessages();
    }
    
    showFeed();
</script>

</body>
</html>
