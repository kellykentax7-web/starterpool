<!DOCTYPE html>
<html>
<head>
    <title>StarterPool - Find Talent</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.light {
            --bg: #fafafa;
            --card-bg: white;
            --text: #262626;
            --border: #dbdbdb;
            --nav-bg: white;
            --input-bg: #efefef;
            --sent-msg: #0095f6;
            --received-msg: #efefef;
        }
        
        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --border: #2c2c2c;
            --nav-bg: #1e1e1e;
            --input-bg: #2c2c2c;
            --sent-msg: #0095f6;
            --received-msg: #2c2c2c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        .top-bar {
            background: var(--nav-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f3460, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-icons {
            display: flex;
            gap: 20px;
        }
        
        .nav-icons button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 5px;
        }
        
        .search-container {
            padding: 12px 16px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
        }
        
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
        }
        
        .search-input {
            flex: 1;
            background: none;
            border: none;
            font-size: 16px;
            color: var(--text);
            outline: none;
        }
        
        .cancel-btn {
            background: none;
            border: none;
            color: #0095f6;
            font-size: 14px;
            cursor: pointer;
        }
        
        .categories-row {
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            background: var(--nav-bg);
        }
        
        .categories-row::-webkit-scrollbar { display: none; }
        
        .category-chip {
            display: inline-block;
            padding: 8px 20px;
            margin-right: 10px;
            background: var(--input-bg);
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .category-chip.active {
            background: #0095f6;
            color: white;
        }
        
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
            padding-bottom: 80px;
        }
        
        .post {
            background: var(--card-bg);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            overflow: hidden;
        }
        
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .post-user-info {
            flex: 1;
            cursor: pointer;
        }
        
        .post-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .post-category-tag {
            font-size: 11px;
            color: #0095f6;
        }
        
        .post-time {
            font-size: 10px;
            color: #8e8e8e;
        }
        
        .post-media {
            background: var(--input-bg);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 12px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .post-emoji { font-size: 80px; }
        
        .post-video {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .post-caption { padding: 12px; font-size: 14px; }
        
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 8px 12px;
        }
        
        .post-action {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .action-count { font-size: 14px; color: var(--text); }
        
        .post-likes {
            padding: 0 12px 4px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .comments-section {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            display: none;
        }
        
        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .comment-name { font-weight: 600; }
        
        .comment-input-area {
            display: flex;
            gap: 10px;
            padding: 8px 0;
        }
        
        .comment-input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--input-bg);
            color: var(--text);
        }
        
        .profile-result {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .profile-result-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        
        .profile-result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-result-name { font-weight: 600; }
        .profile-result-category { font-size: 12px; color: #0095f6; }
        
        .profile-view {
            background: var(--card-bg);
            min-height: 100vh;
        }
        
        .profile-cover {
            height: 150px;
            background: linear-gradient(135deg, #0f3460, #e94560);
        }
        
        .profile-info-section {
            padding: 0 16px;
        }
        
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-top: -50px;
            border: 3px solid var(--card-bg);
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0095f6;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            border: 2px solid var(--card-bg);
        }
        
        .profile-name-large {
            font-size: 20px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .profile-bio-text {
            margin: 8px 0;
            font-size: 14px;
        }
        
        .profile-link {
            color: #0095f6;
            text-decoration: none;
            font-size: 13px;
        }
        
        .edit-profile-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 15px 0;
            font-size: 14px;
            color: var(--text);
            width: 100%;
        }
        
        .follow-btn, .following-btn, .message-profile-btn {
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            border: none;
            margin: 5px 0;
        }
        
        .follow-btn {
            background: #0095f6;
            color: white;
        }
        
        .following-btn {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .message-profile-btn {
            background: var(--input-bg);
            color: var(--text);
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 15px 0;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-weight: 700;
            font-size: 18px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8e8e8e;
        }
        
        .edit-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            z-index: 2000;
            border: 1px solid var(--border);
        }
        
        .edit-modal input, .edit-modal textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text);
        }
        
        .edit-modal textarea {
            resize: none;
            height: 80px;
        }
        
        .save-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .dm-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--card-bg);
            z-index: 200;
            flex-direction: column;
        }
        
        .dm-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--nav-bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .dm-back {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }
        
        .dm-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .dm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .dm-msg-sent {
            background: var(--sent-msg);
            color: white;
            align-self: flex-end;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
        }
        
        .dm-msg-received {
            background: var(--received-msg);
            color: var(--text);
            align-self: flex-start;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
        }
        
        .dm-input-area {
            display: flex;
            padding: 12px;
            gap: 10px;
            border-top: 1px solid var(--border);
            background: var(--nav-bg);
            position: sticky;
            bottom: 0;
        }
        
        .dm-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
        }
        
        .dm-send-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #8e8e8e;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        
        @media (max-width: 600px) {
            .post-media { min-height: 250px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🏊 StarterPool</div>
    <div class="nav-icons">
        <button onclick="showFeed()">🏠</button>
        <button onclick="showSearch()">🔍</button>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="search-container" id="searchContainer" style="display: none;">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by category or name...">
        <button class="cancel-btn" onclick="clearSearch()">Cancel</button>
    </div>
</div>

<div class="categories-row" id="categoriesRow">
    <span class="category-chip active" data-cat="all" onclick="filterByCategory('all')">All</span>
    <span class="category-chip" data-cat="engineer" onclick="filterByCategory('engineer')">🔧 Engineer</span>
    <span class="category-chip" data-cat="designer" onclick="filterByCategory('designer')">🎨 Designer</span>
    <span class="category-chip" data-cat="developer" onclick="filterByCategory('developer')">💻 Developer</span>
    <span class="category-chip" data-cat="writer" onclick="filterByCategory('writer')">✍️ Writer</span>
    <span class="category-chip" data-cat="marketer" onclick="filterByCategory('marketer')">📱 Marketer</span>
    <span class="category-chip" data-cat="video" onclick="filterByCategory('video')">🎬 Video</span>
    <span class="category-chip" data-cat="assistant" onclick="filterByCategory('assistant')">📋 Assistant</span>
    <span class="category-chip" data-cat="translator" onclick="filterByCategory('translator')">🌐 Translator</span>
</div>

<div class="feed-container" id="mainContainer">
    <div class="empty-state">Loading...</div>
</div>

<div id="dmPage" class="dm-page">
    <div class="dm-header">
        <button class="dm-back" onclick="closeDM()">←</button>
        <span class="dm-name" id="dmName">Chat</span>
    </div>
    <div id="dmMessages" class="dm-messages"></div>
    <div class="dm-input-area">
        <input type="text" id="dmInput" class="dm-input" placeholder="Message...">
        <button class="dm-send-btn" onclick="sendDM()">Send</button>
    </div>
</div>

<div id="editModal" class="edit-modal">
    <h3 style="margin-bottom:15px;">Edit Profile</h3>
    <input type="text" id="editName" placeholder="Name">
    <textarea id="editBio" placeholder="Bio"></textarea>
    <input type="url" id="editLink" placeholder="Website / Portfolio">
    <input type="file" id="editAvatar" accept="image/*">
    <button class="save-btn" onclick="saveProfile()">Save</button>
    <button onclick="closeEditModal()" style="margin-top:10px; background:none; border:none; cursor:pointer;">Cancel</button>
</div>
<div id="overlay" class="overlay" onclick="closeEditModal()"></div>

<script>
    // Theme
    function toggleTheme() {
        var body = document.body;
        if (body.classList.contains('light')) {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('theme', 'light');
        }
    }
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
    } else {
        document.body.classList.add('light');
    }
    
    // User Profile
    var currentUserId = "1";
    var userProfile = JSON.parse(localStorage.getItem('userProfile')) || {
        id: "1", name: "Maria Chen", avatar: "👩‍💻", avatarImg: null,
        category: "developer", rate: 18, bio: "React frontend developer passionate about building beautiful interfaces.",
        location: "UCLA", link: "https://github.com/mariachen", posts: 12, followers: 245, following: 180
    };
    
    var userLikedPosts = JSON.parse(localStorage.getItem('userLikedPosts')) || {};
    var userFollowing = JSON.parse(localStorage.getItem('userFollowing')) || {};
    
    // All students - complete list
    var students = [
        { id: "1", name: "Maria Chen", avatar: "👩‍💻", avatarImg: null, category: "developer", rate: 18, bio: "React frontend developer", location: "UCLA", link: "https://github.com/mariachen", posts: 12, followers: 245, following: 180 },
        { id: "2", name: "James Okafor", avatar: "👨‍💻", avatarImg: null, category: "developer", rate: 22, bio: "Python backend developer", location: "MIT", link: "https://github.com/jamesokafor", posts: 8, followers: 512, following: 234 },
        { id: "3", name: "Sarah Johnson", avatar: "✍️", avatarImg: null, category: "writer", rate: 15, bio: "SEO content writer", location: "NYU", link: "https://sarahjohnson.contently.com", posts: 20, followers: 278, following: 92 },
        { id: "4", name: "Emma Watson", avatar: "🎨", avatarImg: null, category: "designer", rate: 19, bio: "Logo designer", location: "RISD", link: "https://behance.net/emmawatson", posts: 15, followers: 389, following: 145 },
        { id: "5", name: "Michael Chen", avatar: "🔧", avatarImg: null, category: "engineer", rate: 25, bio: "Mechanical engineer", location: "Texas A&M", link: "https://linkedin.com/in/michaelchen", posts: 10, followers: 167, following: 88 },
        { id: "6", name: "Emily Rodriguez", avatar: "📱", avatarImg: null, category: "marketer", rate: 17, bio: "Social media strategist", location: "USC", link: "#", posts: 14, followers: 234, following: 120 },
        { id: "7", name: "Alex Wong", avatar: "🎬", avatarImg: null, category: "video", rate: 21, bio: "Video editor", location: "NYU Film", link: "#", posts: 9, followers: 189, following: 76 }
    ];
    
    // Update user profile in students array
    for (var i = 0; i < students.length; i++) {
        if (students[i].id === "1") {
            students[i] = userProfile;
            break;
        }
    }
    
    var workingVideoUrl = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
    
    var posts = [
        { id: 1, userId: "1", name: userProfile.name, avatar: userProfile.avatar, avatarImg: userProfile.avatarImg, category: "developer", content: "Just finished a React dashboard! Check it out", mediaType: "emoji", mediaUrl: "💻", likes: 45, comments: [], time: "2h ago" },
        { id: 2, userId: "2", name: "James Okafor", avatar: "👨‍💻", avatarImg: null, category: "developer", content: "Watch my API deployment tutorial", mediaType: "video", mediaUrl: workingVideoUrl, likes: 89, comments: [], time: "5h ago" },
        { id: 3, userId: "4", name: "Emma Watson", avatar: "🎨", avatarImg: null, category: "designer", content: "New logo for a coffee shop", mediaType: "emoji", mediaUrl: "🎨", likes: 234, comments: [], time: "1d ago" }
    ];
    
    var conversations = JSON.parse(localStorage.getItem('starterpool_conversations')) || {};
    var currentView = 'feed';
    var currentCategory = 'all';
    var currentDMUser = null;
    
    function showFeed() {
        currentView = 'feed';
        document.getElementById('searchContainer').style.display = 'none';
        document.getElementById('dmPage').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        renderFeed();
    }
    
    function showSearch() {
        currentView = 'search';
        document.getElementById('searchContainer').style.display = 'block';
        document.getElementById('dmPage').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        renderSearchResults(students);
    }
    
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        showFeed();
    }
    
    function filterByCategory(category) {
        currentCategory = category;
        var chips = document.querySelectorAll('.category-chip');
        chips.forEach(function(chip) {
            if (chip.getAttribute('data-cat') === category) {
                chip.classList.add('active');
            } else {
                chip.classList.remove('active');
            }
        });
        if (currentView === 'feed') {
            renderFeed();
        } else if (currentView === 'search') {
            renderSearchResults(students);
        }
    }
    
    function renderFeed() {
        var container = document.getElementById('mainContainer');
        var filteredPosts = posts.filter(function(p) {
            if (currentCategory === 'all') return true;
            return p.category === currentCategory;
        });
        
        if (filteredPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">No posts in this category</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filteredPosts.length; i++) {
            var p = filteredPosts[i];
            var hasLiked = userLikedPosts[p.id] === true;
            var avatarHtml = p.avatarImg ? '<img src="' + p.avatarImg + '">' : p.avatar;
            var mediaHtml = '';
            if (p.mediaType === 'video') {
                mediaHtml = '<video class="post-video" controls preload="auto" playsinline src="' + p.mediaUrl + '"></video>';
            } else {
                mediaHtml = '<div class="post-emoji">' + p.mediaUrl + '</div>';
            }
            
            var commentsHtml = '';
            if (p.comments && p.comments.length > 0) {
                for (var c = 0; c < p.comments.length; c++) {
                    commentsHtml += '<div class="comment"><span class="comment-name">' + p.comments[c].name + ':</span> ' + p.comments[c].text + '</div>';
                }
            }
            
            html += '<div class="post">';
            html += '<div class="post-header">';
            html += '<div class="post-avatar" onclick="viewProfile(\'' + p.userId + '\')">' + avatarHtml + '</div>';
            html += '<div class="post-user-info" onclick="viewProfile(\'' + p.userId + '\')">';
            html += '<div class="post-name">' + p.name + '</div>';
            html += '<div class="post-category-tag">' + p.category.toUpperCase() + '</div>';
            html += '<div class="post-time">' + p.time + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="post-media">' + mediaHtml + '</div>';
            html += '<div class="post-caption">' + p.content + '</div>';
            html += '<div class="post-actions">';
            html += '<button class="post-action" onclick="likePost(' + p.id + ')">' + (hasLiked ? '❤️' : '🤍') + '<span class="action-count">' + p.likes + '</span></button>';
            html += '<button class="post-action" onclick="toggleComments(' + p.id + ')">💬<span class="action-count">' + (p.comments ? p.comments.length : 0) + '</span></button>';
            html += '<button class="post-action" onclick="viewProfile(\'' + p.userId + '\')">👤</button>';
            html += '</div>';
            html += '<div class="post-likes">' + p.likes + ' likes</div>';
            html += '<div class="comments-section" id="comments-' + p.id + '">';
            html += '<div id="comments-list-' + p.id + '">' + commentsHtml + '</div>';
            html += '<div class="comment-input-area">';
            html += '<input type="text" id="comment-input-' + p.id + '" class="comment-input" placeholder="Add a comment...">';
            html += '<button onclick="addComment(' + p.id + ')" style="background:#0095f6; color:white; border:none; padding:8px 16px; border-radius:20px;">Post</button>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    function likePost(postId) {
        if (userLikedPosts[postId]) return;
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) {
                posts[i].likes++;
                userLikedPosts[postId] = true;
                localStorage.setItem('userLikedPosts', JSON.stringify(userLikedPosts));
                break;
            }
        }
        renderFeed();
    }
    
    function toggleComments(postId) {
        var commentsDiv = document.getElementById('comments-' + postId);
        if (commentsDiv.style.display === 'none' || commentsDiv.style.display === '') {
            commentsDiv.style.display = 'block';
        } else {
            commentsDiv.style.display = 'none';
        }
    }
    
    function addComment(postId) {
        var input = document.getElementById('comment-input-' + postId);
        var commentText = input.value.trim();
        if (!commentText) return;
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) {
                if (!posts[i].comments) posts[i].comments = [];
                posts[i].comments.push({ name: "You", text: commentText });
                break;
            }
        }
        input.value = '';
        renderFeed();
    }
    
    function renderSearchResults(studentsList) {
        var container = document.getElementById('mainContainer');
        var searchInput = document.getElementById('searchInput');
        var query = searchInput ? searchInput.value.toLowerCase().trim() : '';
        
        var filtered = studentsList.filter(function(s) {
            if (currentCategory !== 'all' && s.category !== currentCategory) return false;
            if (query) {
                return s.category.toLowerCase().includes(query) || 
                       s.name.toLowerCase().includes(query) ||
                       s.location.toLowerCase().includes(query);
            }
            return true;
        });
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">No results found for "' + (query || currentCategory) + '"</div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var s = filtered[i];
            var avatarHtml = s.avatarImg ? '<img src="' + s.avatarImg + '">' : s.avatar;
            html += '<div class="profile-result" onclick="viewProfile(\'' + s.id + '\')">';
            html += '<div class="profile-result-avatar">' + avatarHtml + '</div>';
            html += '<div style="flex:1;">';
            html += '<div class="profile-result-name">' + s.name + '</div>';
            html += '<div class="profile-result-category">' + s.category.toUpperCase() + '</div>';
            html += '<div>💰 $' + s.rate + '/hour</div>';
            html += '<div>📍 ' + s.location + '</div>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    // Live search
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            if (currentView === 'search') {
                renderSearchResults(students);
            }
        });
    }
    
    function openEditModal() {
        document.getElementById('editName').value = userProfile.name;
        document.getElementById('editBio').value = userProfile.bio || '';
        document.getElementById('editLink').value = userProfile.link || '';
        document.getElementById('editModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    
    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
    
    function saveProfile() {
        userProfile.name = document.getElementById('editName').value;
        userProfile.bio = document.getElementById('editBio').value;
        userProfile.link = document.getElementById('editLink').value;
        
        var avatarFile = document.getElementById('editAvatar').files[0];
        if (avatarFile) {
            var reader = new FileReader();
            reader.onload = function(e) {
                userProfile.avatarImg = e.target.result;
                userProfile.avatar = null;
                localStorage.setItem('userProfile', JSON.stringify(userProfile));
                for (var i = 0; i < students.length; i++) {
                    if (students[i].id === "1") {
                        students[i] = userProfile;
                        break;
                    }
                }
                for (var p = 0; p < posts.length; p++) {
                    if (posts[p].userId === "1") {
                        posts[p].name = userProfile.name;
                        posts[p].avatar = userProfile.avatar;
                        posts[p].avatarImg = userProfile.avatarImg;
                    }
                }
                closeEditModal();
                renderFeed();
            };
            reader.readAsDataURL(avatarFile);
        } else {
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            for (var i = 0; i < students.length; i++) {
                if (students[i].id === "1") {
                    students[i] = userProfile;
                    break;
                }
            }
            for (var p = 0; p < posts.length; p++) {
                if (posts[p].userId === "1") {
                    posts[p].name = userProfile.name;
                }
            }
            closeEditModal();
            renderFeed();
        }
    }
    
    function followUser(userId, userName) {
        if (userFollowing[userId]) {
            delete userFollowing[userId];
        } else {
            userFollowing[userId] = true;
        }
        localStorage.setItem('userFollowing', JSON.stringify(userFollowing));
        viewProfile(userId);
    }
    
    function viewProfile(userId) {
        var student = null;
        for (var i = 0; i < students.length; i++) {
            if (students[i].id === userId) {
                student = students[i];
                break;
            }
        }
        if (!student) return;
        
        var isOwner = (userId === "1");
        var isFollowing = userFollowing[userId] === true;
        var avatarHtml = student.avatarImg ? '<img src="' + student.avatarImg + '">' : student.avatar;
        
        var userPosts = posts.filter(function(p) { return p.userId === userId; });
        var postsHtml = '';
        for (var i = 0; i < userPosts.length; i++) {
            var p = userPosts[i];
            var postAvatarHtml = p.avatarImg ? '<img src="' + p.avatarImg + '">' : p.avatar;
            postsHtml += '<div class="post"><div class="post-header"><div class="post-avatar">' + postAvatarHtml + '</div><div><div class="post-name">' + p.name + '</div><div class="post-time">' + p.time + '</div></div></div><div class="post-caption">' + p.content + '</div></div>';
        }
        
        var actionButtonsHtml = '';
        if (isOwner) {
            actionButtonsHtml = '<button class="edit-profile-btn" onclick="openEditModal()">✏️ Edit Profile</button>';
        } else {
            var followBtnHtml = isFollowing ? '<button class="following-btn" onclick="followUser(\'' + student.id + '\', \'' + student.name + '\')">✓ Following</button>' : '<button class="follow-btn" onclick="followUser(\'' + student.id + '\', \'' + student.name + '\')">Follow</button>';
            actionButtonsHtml = followBtnHtml + '<button class="message-profile-btn" onclick="openDM(\'' + student.id + '\', \'' + student.name + '\')">💬 Message</button>';
        }
        
        var html = '';
        html += '<button class="back-btn" onclick="showSearch()">← Back</button>';
        html += '<div class="profile-view">';
        html += '<div class="profile-cover"></div>';
        html += '<div class="profile-info-section">';
        html += '<div class="profile-avatar-large">' + avatarHtml + (isOwner ? '<div class="edit-avatar-btn" onclick="openEditModal()">✏️</div>' : '') + '</div>';
        html += '<div class="profile-name-large">' + student.name + '</div>';
        html += '<div class="profile-category-large">' + student.category.toUpperCase() + ' • $' + student.rate + '/hour</div>';
        html += '<div class="profile-bio-text">' + (student.bio || "No bio yet") + '</div>';
        html += '<div>📍 ' + student.location + '</div>';
        if (student.link && student.link !== '#') html += '<div><a href="' + student.link + '" target="_blank" class="profile-link">🔗 ' + student.link + '</a></div>';
        html += '<div class="stats-row">';
        html += '<div class="stat-item"><div class="stat-number">' + student.posts + '</div><div class="stat-label">posts</div></div>';
        html += '<div class="stat-item"><div class="stat-number">' + student.followers + '</div><div class="stat-label">followers</div></div>';
        html += '<div class="stat-item"><div class="stat-number">' + student.following + '</div><div class="stat-label">following</div></div>';
        html += '</div>';
        html += actionButtonsHtml;
        html += '</div>';
        if (userPosts.length > 0) html += '<div style="padding:15px;"><h3>Recent Work</h3>' + postsHtml + '</div>';
        html += '</div>';
        document.getElementById('mainContainer').innerHTML = html;
    }
    
    function openDM(userId, name) {
        currentDMUser = userId;
        document.getElementById('dmName').innerHTML = name;
        document.getElementById('dmPage').style.display = 'flex';
        document.getElementById('mainContainer').style.display = 'none';
        loadDMMessages();
    }
    
    function closeDM() {
        document.getElementById('dmPage').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        currentDMUser = null;
    }
    
    function loadDMMessages() {
        if (!conversations[currentDMUser]) conversations[currentDMUser] = [];
        var msgsDiv = document.getElementById('dmMessages');
        msgsDiv.innerHTML = '';
        for (var i = 0; i < conversations[currentDMUser].length; i++) {
            var msg = conversations[currentDMUser][i];
            var div = document.createElement('div');
            div.className = msg.sender === 'employer' ? 'dm-msg-sent' : 'dm-msg-received';
            div.innerHTML = msg.text;
            msgsDiv.appendChild(div);
        }
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
    }
    
    function sendDM() {
        var input = document.getElementById('dmInput');
        var message = input.value.trim();
        if (!message || !currentDMUser) return;
        if (!conversations[currentDMUser]) conversations[currentDMUser] = [];
        conversations[currentDMUser].push({ sender: 'employer', text: message });
        localStorage.setItem('starterpool_conversations', JSON.stringify(conversations));
        input.value = '';
        loadDMMessages();
    }
    
    showFeed();
</script>
